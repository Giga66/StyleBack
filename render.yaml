databases:
  - name: styleback-db
    plan: free
    databaseName: styleback
    user: styleback_user

services:
  - type: web
    name: styleback-app
    env: node
    plan: free
    buildCommand: bash ./render-build.sh
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: styleback-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: write_products,write_metaobjects,write_metaobject_definitions,read_orders,read_customers
      - key: SHOPIFY_APP_URL
        sync: false
      - key: NODE_ENV
        value: production
